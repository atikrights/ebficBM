name: Multi-Platform Release (All Platforms)

on:
  push:
    branches:
      - main

jobs:
  build-linux-web-android:
    name: 🌐 Web, Android & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Build Web
        run: flutter build web --release --dart-define=PUSHER_KEY=${{ secrets.PUSHER_KEY }}
      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: Deploy Web to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete --exclude '.env' --timeout=120"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: 65002
          TARGET: "/home/u200841033/domains/ebfic.store/public_html/ebm/"
          SOURCE: "build/web/"
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows
        run: |
          flutter pub get
          flutter build windows --release --dart-define=PUSHER_KEY=${{ secrets.PUSHER_KEY }}
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/

  build-macos-ios:
    name: 🍎 Mac & iOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build MacOS
        run: |
          flutter pub get
          flutter build macos --release
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign
      - name: Upload MacOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: build/macos/Build/Products/Release/
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/

  create-release:
    name: 🚀 Create Multi-Platform Release
    needs: [build-linux-web-android, build-windows, build-macos-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Full Release v1.0.${{ github.run_number }}"
          body: "Multi-platform automated build (Web, Android, Windows, Mac, iOS)."
          files: |
            release-files/**/*.apk
            release-files/**/*.exe
            release-files/**/*.app
            release-files/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
