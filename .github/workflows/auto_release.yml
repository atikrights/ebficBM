name: Auto Build & Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'version.json'
      - 'pubspec.yaml'
      - '.github/workflows/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java for Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Last Commit Message
        id: commit_msg
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B | head -n 1)
          echo "COMMIT_MSG=$MSG" >> $GITHUB_ENV

      - name: Auto Bump Version
        shell: python
        run: |
          import json
          import re
          import os

          # Read and update version.json
          with open('version.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          current_version = data['version']
          parts = [int(p) for p in current_version.split('.')]
          parts[-1] += 1
          new_version = f"{parts[0]}.{parts[1]}.{parts[2]}"

          data['version'] = new_version
          data['notes'] = os.environ.get('COMMIT_MSG', 'Auto update containing new features and bug fixes.')
          data['url'] = "https://github.com/atikrights/ebficBM/releases/latest"

          with open('version.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2)

          # Read and update pubspec.yaml
          with open('pubspec.yaml', 'r', encoding='utf-8') as f:
              pubspec = f.read()

          match = re.search(r'version:\s*\d+\.\d+\.\d+\+(\d+)', pubspec)
          b_num = int(match.group(1)) + 1 if match else 1
          pubspec = re.sub(r'version:\s*\d+\.\d+\.\d+\+\d+', f'version: {new_version}+{b_num}', pubspec)

          with open('pubspec.yaml', 'w', encoding='utf-8') as f:
              f.write(pubspec)

          # Export for next steps
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"NEW_VERSION={new_version}\n")

      - name: Commit Version Bump
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json pubspec.yaml
          git commit -m "chore: auto bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Windows App
        run: flutter build windows --release

      - name: Zip Windows App
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath BizOS_Windows_v${{ env.NEW_VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: "ebfic Business Manager v${{ env.NEW_VERSION }}"
          body: |
            ## 🚀 ebfic Business Manager v${{ env.NEW_VERSION }}
            > by **Atik Islam** | **ebfic Group Limited**

            ### 📝 What's New:
            ${{ env.COMMIT_MSG }}
            
            ### 📥 Downloads:
            | Platform | File |
            |----------|------|
            | 🧑‍💻 Windows | `BizOS_Windows_v${{ env.NEW_VERSION }}.zip` |
            | 📱 Android | `app-release.apk` |
          draft: false
          prerelease: false
          make_latest: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            BizOS_Windows_v${{ env.NEW_VERSION }}.zip
