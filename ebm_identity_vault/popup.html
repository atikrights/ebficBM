<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #0d0e15;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --primary: #5d5fef; /* Stitch Purple/Blue */
            --primary-glow: rgba(93, 95, 239, 0.5);
            --secondary: #00d4ff; /* Accent Cyan */
            --text: #ffffff;
            --text-dim: #8e8ea0;
            --border-light: rgba(255, 255, 255, 0.06);
            --danger: #ef4444;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            width: 100%;
            height: 100%;
        }

        body {
            position: relative;
            min-width: 380px;
            background-color: var(--bg-color); /* Stitch Dark Base */
            color: var(--text);
            font-family: -apple-system, Inter, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        /* Snake Container */
        .snake-boundary {
            position: relative;
            width: 100%;
            flex: 1; /* Stretch to fill window */
            padding: 2px;
            background-color: #000;
            overflow: hidden; 
            box-sizing: border-box;
            display: flex;
        }

        .snake-boundary::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(
                transparent 40deg, 
                var(--primary) 120deg, 
                var(--secondary) 180deg,
                transparent 220deg
            );
            animation: snakeRun 3.5s linear infinite;
            z-index: 0; 
        }

        @keyframes snakeRun {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-content {
            position: relative;
            background: radial-gradient(circle at top right, rgba(93, 95, 239, 0.1) 0%, var(--bg-color) 70%);
            border-radius: 4px; /* inner radius matching snake edge smoothly */
            z-index: 1; 
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
            box-sizing: border-box;
            width: 100%;
            flex: 1; /* Fills the inner black space completely */
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        }

        /* Elite Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
            font-size: 13px;
        }
        .title {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0;
            color: var(--text);
        }
        .popout-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            padding: 4px 6px;
            font-size: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .popout-btn:hover {
            color: var(--text);
            border-color: var(--primary);
            background: rgba(255,255,255,0.05);
        }

        .desc {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .view-container {
            display: none;
            flex-direction: column;
            gap: 14px;
            animation: popUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .active-view {
            display: flex !important;
        }
        @keyframes popUpFade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs */
        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 2px;
        }
        .input-box {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .input-box:focus-within {
            border-color: var(--primary);
            background: var(--surface-hover);
            box-shadow: 0 0 10px rgba(93, 95, 239, 0.2);
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 30px 10px 12px;
            box-sizing: border-box;
            outline: none;
            letter-spacing: 0.5px;
        }
        input::placeholder { color: var(--text-dim); opacity: 0.5; }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .eye-icon:hover { color: var(--primary); }

        /* Buttons */
        .action-btn {
            background: linear-gradient(135deg, var(--primary), #4338ca);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 6px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }
        .danger-btn {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .danger-btn:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
        
        .secondary-btn {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border-light);
            box-shadow: none;
            margin-top: 0px;
        }
        .secondary-btn:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }

        /* List View Styles */
        .search-bar {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            margin-bottom: 10px;
        }
        .search-bar input {
            padding: 10px 0;
            font-size: 12px;
            height: 100%;
        }
        
        .accounts-scroll {
            height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        .accounts-scroll::-webkit-scrollbar { width: 4px; }
        .accounts-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        
        .account-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }
        .account-card:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }
        .acc-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            white-space: nowrap;
        }
        .acc-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .acc-email {
            font-size: 10px;
            color: var(--text-dim);
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .acc-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-size: 12px;
        }
        .icon-btn:hover {
            background: var(--primary);
        }

        /* Edit View Sub-Header */
        .sub-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
        }
        .back-btn:hover { color: var(--text); }
        .sub-title { font-size: 13px; font-weight: 700; }

        .footer {
            text-align: center;
            font-size: 8px;
            font-weight: 800;
            color: var(--text-dim);
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            transition: 0.3s;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #toast.show { bottom: 20px; }

        /* ─── Audit Log Styles ─────────────────────────────── */
        .audit-scroll {
            height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        .audit-scroll::-webkit-scrollbar { width: 4px; }
        .audit-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        .audit-entry {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: 0.2s;
        }
        .audit-entry:hover { background: var(--surface-hover); }
        .audit-entry.status-success { border-left: 3px solid #00cc77; }
        .audit-entry.status-failed  { border-left: 3px solid #f59e0b; }
        .audit-entry.status-blocked { border-left: 3px solid #ef4444; }

        .audit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .audit-status {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .audit-status.success { background: rgba(0,204,119,0.15); color: #00cc77; }
        .audit-status.failed  { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .audit-status.blocked { background: rgba(239,68,68,0.15);  color: #ef4444; }

        .audit-time {
            font-size: 10px;
            color: var(--text-dim);
        }
        .audit-device {
            font-size: 11px;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .audit-meta {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .audit-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            background: rgba(93,95,239,0.15);
            color: var(--primary);
        }
        .audit-tag.vault-tag { background: rgba(0,212,255,0.1); color: var(--secondary); }
        .audit-empty {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="snake-boundary">
        <div class="app-content">
            
            <div class="header">
                <div class="header-left">
                    <div class="icon">🛡️</div>
                    <h2 class="title" style="letter-spacing: 1px;">EBM VAULT PRO</h2>
                </div>
                <!-- Float button to allow moving window -->
                <button id="btn-popout" class="popout-btn" title="Open Desktop Float Window">⛶ FLOAT</button>
            </div>
            
            <!-- 1. Setup View -->
            <div id="view-setup" class="view-container">
                <div class="desc">Initialize local zero-knowledge environment.</div>
                <div class="input-group">
                    <label class="input-label">Master Password</label>
                    <div class="input-box">
                        <input type="password" id="setup-master-pwd" placeholder="Enter password" autofocus>
                        <span class="eye-icon" data-target="setup-master-pwd">👁️</span>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <div class="input-box">
                        <input type="password" id="setup-master-pwd-confirm" placeholder="Confirm password">
                    </div>
                </div>
                <button id="btn-setup" class="action-btn">Initialize Vault</button>
            </div>

            <!-- 2. Login View -->
            <div id="view-login" class="view-container">
                <div class="desc" style="color:var(--secondary)">Authenticate to decrypt EBM credentials.</div>
                <div class="input-group">
                    <label class="input-label">Master Password</label>
                    <div class="input-box">
                        <input type="password" id="login-master-pwd" placeholder="Enter password" autofocus>
                        <span class="eye-icon" data-target="login-master-pwd">👁️</span>
                    </div>
                </div>
                <button id="btn-login" class="action-btn">Unlock Vault</button>
            </div>

            <!-- 3. List View -->
            <div id="view-list" class="view-container">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search saved accounts...">
                </div>
                <div id="accounts-list" class="accounts-scroll">
                    <!-- Populated by JS -->
                </div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button id="btn-add-account" class="action-btn secondary-btn" style="flex:1;">+ Create New Credential</button>
                    <button id="btn-open-audit" class="action-btn secondary-btn" style="flex:0; padding:0 14px;" title="View Audit Log">📋</button>
                </div>
            </div>

            <!-- 4. Edit/Add View -->
            <div id="view-edit" class="view-container">
                <div class="sub-header">
                    <button id="btn-back" class="back-btn">⬅️</button>
                    <span class="sub-title" id="edit-title-text">Add Credential</span>
                </div>
                
                <div style="height: 280px; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 10px;" class="accounts-scroll">
                    <div class="input-group">
                        <label class="input-label">Entity Profile Name</label>
                        <div class="input-box">
                            <input type="text" id="edit-profile-name" placeholder="E.g. Super Admin Portal" autocomplete="off" />
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Administrator Email</label>
                        <div class="input-box">
                            <input type="text" id="edit-email" placeholder="admin@ebm.com" autocomplete="off" />
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Access Key Alpha</label>
                        <div class="input-box">
                            <input type="password" id="edit-pass1" autocomplete="off" />
                            <span class="eye-icon" data-target="edit-pass1">👁️</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Access Key Beta</label>
                        <div class="input-box">
                            <input type="password" id="edit-pass2" autocomplete="off" />
                            <span class="eye-icon" data-target="edit-pass2">👁️</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Access Key Gamma</label>
                        <div class="input-box">
                            <input type="password" id="edit-pass3" autocomplete="off" />
                            <span class="eye-icon" data-target="edit-pass3">👁️</span>
                        </div>
                    </div>
                </div>
                
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button id="btn-save-account" class="action-btn" style="flex:1;">Save Data</button>
                    <button id="btn-delete-account" class="action-btn danger-btn" style="flex:1; display:none;">Delete</button>
                </div>
            </div>

            <!-- 5. Audit Log View -->
            <div id="view-audit" class="view-container">
                <div class="sub-header">
                    <button id="btn-back-audit" class="back-btn">⬅️</button>
                    <span class="sub-title">📋 Access Audit Log</span>
                    <button id="btn-clear-audit" style="margin-left:auto; background:transparent; border:1px solid rgba(239,68,68,0.3); color:#ef4444; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:700; cursor:pointer; letter-spacing:1px;">CLEAR</button>
                </div>
                <div id="audit-list" class="audit-scroll">
                    <div class="audit-empty">Loading audit log...</div>
                </div>
            </div>

            <div class="footer">STITCH ENTERPRISE VAULT</div>
        </div>
    </div>
    
    <div id="toast">Message</div>
    <script src="popup.js"></script>
</body>
</html>
