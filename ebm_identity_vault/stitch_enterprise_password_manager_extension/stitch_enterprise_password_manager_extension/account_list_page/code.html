<body class="bg-surface text-on-surface h-screen w-full flex justify-center items-center overflow-hidden">
<div class="relative w-full max-w-[400px] h-full max-h-[600px] bg-surface flex flex-col shadow-2xl overflow-hidden rounded-xl">
