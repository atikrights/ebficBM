<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obsidian Veil - Unlock Vault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#c6c6cd",
              "inverse-surface": "#dce1fb",
              "on-secondary-fixed-variant": "#3a485c",
              "tertiary-fixed-dim": "#bdc2ff",
              "tertiary-container": "#00055c",
              "primary-container": "#001b1f",
              "tertiary-fixed": "#e0e0ff",
              "surface-container-lowest": "#070d1f",
              "on-background": "#dce1fb",
              "on-primary-container": "#008e9f",
              "secondary-fixed-dim": "#b9c7e0",
              "outline-variant": "#45464d",
              "outline": "#909097",
              "primary": "#00daf3",
              "surface-container": "#191f31",
              "inverse-primary": "#006875",
              "on-tertiary-fixed": "#000767",
              "surface-variant": "#2e3447",
              "on-secondary-fixed": "#0d1c2f",
              "surface-bright": "#33394c",
              "on-error-container": "#ffdad6",
              "error": "#ffb4ab",
              "surface-container-highest": "#2e3447",
              "error-container": "#93000a",
              "surface-tint": "#00daf3",
              "tertiary": "#bdc2ff",
              "secondary-fixed": "#d5e3fd",
              "primary-fixed-dim": "#00daf3",
              "surface-container-low": "#151b2d",
              "primary-fixed": "#9cf0ff",
              "on-tertiary-fixed-variant": "#2f3aa3",
              "surface": "#0c1324",
              "secondary": "#b9c7e0",
              "secondary-container": "#3c4a5e",
              "on-surface": "#dce1fb",
              "on-tertiary": "#131e8c",
              "on-error": "#690005",
              "on-tertiary-container": "#6c77e1",
              "on-secondary": "#233144",
              "background": "#0c1324",
              "on-primary-fixed": "#001f24",
              "surface-dim": "#0c1324",
              "inverse-on-surface": "#2a3043",
              "surface-container-high": "#23293c",
              "on-secondary-container": "#abb9d2",
              "on-primary": "#00363d",
              "on-primary-fixed-variant": "#004f58"
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px"
            },
            fontFamily: {
              headline: ["Inter"],
              body: ["Inter"],
              label: ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #0c1324;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .extension-container {
            width: 400px;
            height: 600px;
            position: relative;
            background-color: #0c1324; /* surface */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Custom styles based on design system */
        .glass-panel {
            background-color: rgba(46, 52, 71, 0.6); /* surface-variant at 60% */
            backdrop-filter: blur(16px);
        }
        .ambient-shadow {
            box-shadow: 0 8px 24px rgba(0, 218, 243, 0.08);
        }
        .glow-button {
            background: linear-gradient(to right, #00daf3, #008e9f); /* primary to on-primary-container */
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 8px 4px rgba(156, 240, 255, 0.4); /* primary_fixed glow */
        }
        .glass-input {
            background-color: #070d1f; /* surface-container-lowest */
            border: 1px solid rgba(69, 70, 77, 0.15); /* outline-variant 15% */
            transition: all 0.3s ease;
        }
        .glass-input:focus-within {
            border-color: rgba(69, 70, 77, 0.4); /* outline-variant 40% */
            box-shadow: inset 0 0 8px rgba(0, 218, 243, 0.2); /* primary inner glow */
        }
    </style>
</head>
<body>
<div class="extension-container shadow-2xl rounded-xl border border-surface-container-high relative">
<!-- Background Gradient Mask -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-container-low via-surface to-surface pointer-events-none z-0"></div>
<!-- TopAppBar -->
<!-- Content & Structure from JSON -->
<header class="sticky top-0 w-full z-50 bg-slate-900/60 backdrop-blur-xl bg-gradient-to-b from-slate-800/20 to-transparent shadow-[0_8px_32px_0_rgba(0,218,243,0.05)]">
<div class="flex justify-between items-center px-5 h-16 w-full max-w-[400px] mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-cyan-400" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="text-xl font-black text-cyan-400 tracking-widest uppercase">Obsidian Veil</span>
</div>
<div class="flex items-center gap-4 text-slate-400">
<span class="material-symbols-outlined text-slate-400">security</span>
<span class="material-symbols-outlined text-slate-400">more_vert</span>
</div>
</div>
</header>
<!-- Main Content - Canvas (Transactional Intent: Suppress normal navigation, but context asks for locked state) -->
<main class="flex-1 flex flex-col justify-center items-center px-6 z-10 pb-16">
<!-- Locked State Icon Container -->
<div class="mb-8 relative flex justify-center items-center w-24 h-24 rounded-full bg-surface-container-low shadow-[0_0_40px_rgba(0,218,243,0.15)] border border-surface-container-high">
<div class="absolute inset-0 rounded-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/10 to-transparent"></div>
<span class="material-symbols-outlined text-5xl text-on-surface-variant relative z-10" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="w-full glass-panel rounded-xl p-8 flex flex-col gap-6 items-center text-center ambient-shadow border border-surface-container-highest/50">
<div class="flex flex-col gap-2 w-full">
<h1 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Vault Locked</h1>
<p class="font-body text-sm text-on-surface-variant">Enter your master password to access your secure data.</p>
</div>
<div class="w-full flex flex-col gap-4">
<div class="glass-input w-full rounded-lg px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">key</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-base placeholder:text-on-surface-variant/50 p-0" placeholder="Master Password" type="password"/>
</div>
<button class="w-full glow-button rounded-lg py-3 px-4 flex justify-center items-center gap-2">
<span class="font-label text-sm font-bold text-on-primary uppercase tracking-[0.05em]">Unlock Vault</span>
<span class="material-symbols-outlined text-on-primary text-lg" style="font-variation-settings: 'FILL' 1;">lock_open</span>
</button>
</div>
<a class="font-label text-xs text-primary hover:text-primary-fixed transition-colors" href="#">Forgot master password?</a>
</div>
</main>
<!-- BottomNavBar (Disabled State based on context) -->
<!-- Content & Structure from JSON, but styling adapted for disabled state -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-slate-950/80 backdrop-blur-2xl border-t border-slate-700/30 shadow-[0_-8px_32px_0_rgba(0,0,0,0.5)] opacity-50 pointer-events-none">
<div class="flex justify-around items-center h-16 w-full max-w-[400px] mx-auto px-6 pb-2">
<div class="flex flex-col items-center justify-center text-slate-600 gap-1">
<span class="material-symbols-outlined text-xl">lock</span>
<span class="text-[10px] font-bold uppercase tracking-[0.05em] font-headline">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-600 gap-1">
<span class="material-symbols-outlined text-xl">key</span>
<span class="text-[10px] font-bold uppercase tracking-[0.05em] font-headline">Generator</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-600 gap-1">
<span class="material-symbols-outlined text-xl">settings</span>
<span class="text-[10px] font-bold uppercase tracking-[0.05em] font-headline">Settings</span>
</div>
</div>
</nav>
</div>
</body></html>
